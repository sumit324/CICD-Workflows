name: practice 
on:
 workflow_dispatch:

jobs:
 build:
  runs-on: ubuntu-latest
  steps:
    - name: enter the username
      run: echo "$USER"
    - name: install nginx
      run: sudo apt-get install nginx

 status:
   runs-on: ubuntu-latest
   needs: [build]
   steps:
     - name: start nginx
       run: sudo service nginx start

     - name: status nginx
       run: sudo service nginx status
 
